<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy &mdash; Expense Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #EFEFEF;
  color: #323232;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
.header {
  background: #000;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}
.header-left { display: flex; align-items: center; gap: 6px; }
.header-logo {
  font-size: 20px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
}
.header-sep {
  width: 1px; height: 24px; background: #6D6E71; margin: 0 10px;
}
.header-title {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
}
.ai-badge {
  background: #9B69FF;
  color: #fff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  margin-left: 12px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #939598;
}
.live-indicator {
  display: flex; align-items: center; gap: 5px;
}
.live-dot {
  width: 7px; height: 7px;
  background: #00CE84;
  border-radius: 50%;
}

/* ── Tab Navigation ─────────────────────────────────────────── */
.tab-nav {
  background: #fff;
  border-bottom: 1px solid #CCCCCC;
  padding: 0 32px;
  display: flex;
  gap: 0;
}
.tab-btn {
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
  color: #6D6E71;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.tab-btn:hover { color: #323232; }
.tab-btn.active {
  color: #000;
  border-bottom-color: #FF6400;
  font-weight: 600;
}
.tab-count {
  background: #FF6400;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
  line-height: 1.4;
}
.tab-count.green { background: #00CE84; }

/* ── Main ───────────────────────────────────────────────────── */
.main { padding: 28px 32px; max-width: 1440px; margin: 0 auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Section Headers ────────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  color: #000;
}
.section-subtitle {
  font-size: 13px;
  color: #6D6E71;
  margin-top: 4px;
}
.total-potential {
  text-align: right;
  background: #fff;
  border: 1px solid #CCCCCC;
  border-radius: 8px;
  padding: 12px 24px;
  flex-shrink: 0;
}
.total-potential-value {
  font-size: 28px;
  font-weight: 800;
  color: #000;
}
.total-potential-label {
  font-size: 11px;
  font-weight: 700;
  color: #6D6E71;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── KPI Cards ──────────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.kpi-card {
  background: #fff;
  border-radius: 8px;
  padding: 20px;
  border: 1px solid #CCCCCC;
  border-top: 3px solid #000;
}
.kpi-card.red { border-top-color: #FF6400; }
.kpi-label {
  font-size: 11px;
  font-weight: 700;
  color: #6D6E71;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 28px;
  font-weight: 800;
  color: #000;
  line-height: 1;
  margin-bottom: 4px;
}
.kpi-sub {
  font-size: 12px;
  color: #939598;
}

/* ── Cards ──────────────────────────────────────────────────── */
.card {
  background: #fff;
  border-radius: 8px;
  border: 1px solid #CCCCCC;
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: #000;
  margin-bottom: 4px;
}
.card-subtitle {
  font-size: 13px;
  color: #6D6E71;
  margin-bottom: 16px;
}

/* ── Tables ─────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  color: #6D6E71;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid #CCCCCC;
}
tbody tr { border-bottom: 1px solid #EFEFEF; }
tbody tr:hover { background: #f8f8f8; }
tbody td { padding: 12px 14px; color: #323232; vertical-align: middle; }
.td-vendor { font-weight: 700; color: #000; }
.td-amount { font-variant-numeric: tabular-nums; }
.td-mom-up { color: #00CE84; font-weight: 600; }
.td-mom-down { color: #FF6400; font-weight: 600; }
.td-mom-flat { color: #939598; }

/* ── Badges & Tags ──────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.badge-green  { background: #e6faf2; color: #00663f; }
.badge-yellow { background: #fff9db; color: #856100; }
.badge-red    { background: #ffe8d9; color: #993300; }
.badge-blue   { background: #e5f4ff; color: #1a6699; }
.badge-amber  { background: #ffedd5; color: #9a3412; }
.badge-gray   { background: #f1f5f9; color: #475569; }

.flag-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: nowrap;
  text-transform: uppercase;
}
.flag-tag.flag-duplicate  { background: #ffe8d9; color: #993300; }
.flag-tag.flag-benchmark  { background: #ffe8d9; color: #993300; }
.flag-tag.flag-underutil  { background: #fff9db; color: #856100; }
.flag-tag.flag-detail     { background: #f1f5f9; color: #475569; }
.flag-tag.flag-ok         { background: #e6faf2; color: #00663f; }

/* ── Chart ──────────────────────────────────────────────────── */
.chart-wrap { position: relative; height: 340px; }

/* ── Recommendation Filters ─────────────────────────────────── */
.rec-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid #CCCCCC;
  background: #fff;
  color: #6D6E71;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { background: #323232; color: #fff; border-color: #323232; }
.filter-btn.active { background: #FF6400; color: #fff; border-color: #FF6400; }

/* ── Recommendation Cards ───────────────────────────────────── */
.rec-card {
  background: #fff;
  border: 1px solid #CCCCCC;
  border-radius: 8px;
  margin-bottom: 10px;
  overflow: hidden;
  border-left: 4px solid #CCCCCC;
  transition: box-shadow 0.15s;
}
.rec-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.rec-card.cat-duplicate   { border-left-color: #FF6400; }
.rec-card.cat-benchmark   { border-left-color: #FF6400; }
.rec-card.cat-detail      { border-left-color: #7CCCFF; }
.rec-card.cat-underutil   { border-left-color: #FFE300; }
.rec-card.cat-scope       { border-left-color: #9B69FF; }
.rec-card.cat-singleline  { border-left-color: #7CCCFF; }

.rec-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  cursor: pointer;
  gap: 12px;
}
.rec-card-header:hover { background: #fafafa; }
.rec-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.rec-category-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.rec-category-tag.cat-duplicate  { background: #ffe8d9; color: #993300; }
.rec-category-tag.cat-benchmark  { background: #ffe8d9; color: #993300; }
.rec-category-tag.cat-detail     { background: #e5f4ff; color: #1a6699; }
.rec-category-tag.cat-underutil  { background: #fff9db; color: #856100; }
.rec-category-tag.cat-scope      { background: #f0e8ff; color: #5b21b6; }
.rec-category-tag.cat-singleline { background: #e5f4ff; color: #1a6699; }

.rec-vendor-name {
  font-size: 14px;
  font-weight: 700;
  color: #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rec-service-type {
  font-size: 12px;
  color: #6D6E71;
  margin-left: 4px;
  white-space: nowrap;
}
.rec-header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.rec-savings-amount {
  font-size: 16px;
  font-weight: 800;
  color: #00CE84;
  white-space: nowrap;
}
.rec-savings-amount.muted {
  color: #939598;
  font-size: 12px;
  font-weight: 500;
}
.rec-expand-icon {
  font-size: 12px;
  color: #6D6E71;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.rec-card.expanded .rec-expand-icon { transform: rotate(180deg); }

.rec-detail {
  display: none;
  padding: 16px 20px 20px;
  border-top: 1px solid #EFEFEF;
  background: #fafafa;
}
.rec-card.expanded .rec-detail { display: block; }
.rec-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.rec-detail-label {
  font-size: 11px;
  font-weight: 700;
  color: #939598;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.rec-detail-text {
  font-size: 13px;
  color: #323232;
  line-height: 1.6;
}

/* ── Load More ──────────────────────────────────────────────── */
.load-more-btn {
  display: block;
  width: 100%;
  padding: 12px;
  border: 1px solid #CCCCCC;
  background: #fff;
  color: #323232;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  margin-top: 16px;
  transition: all 0.15s;
}
.load-more-btn:hover {
  background: #000;
  color: #fff;
  border-color: #000;
}

/* ── Quality Blocks ─────────────────────────────────────────── */
.quality-blocks {
  display: inline-flex;
  gap: 3px;
  align-items: center;
  vertical-align: middle;
}
.quality-block {
  width: 22px;
  height: 10px;
  border-radius: 2px;
  background: #EFEFEF;
}
.quality-block.filled.high { background: #00CE84; }
.quality-block.filled.med { background: #FFE300; }
.quality-block.filled.low { background: #FF6400; }
.quality-score-num {
  font-size: 13px;
  font-weight: 600;
  margin-left: 8px;
  color: #323232;
}

.missing-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: #fff9db;
  color: #856100;
  margin: 2px;
}
.complete-text {
  color: #00CE84;
  font-size: 12px;
  font-weight: 600;
}

/* ── AI Insight Box ─────────────────────────────────────────── */
/* ── Sort Buttons ──────────────────────────────────────────── */
.rec-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.sort-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.sort-label {
  font-size: 12px;
  font-weight: 600;
  color: #6D6E71;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sort-btn {
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid #CCCCCC;
  background: #fff;
  color: #6D6E71;
  cursor: pointer;
  transition: all 0.15s;
}
.sort-btn:hover { background: #f8f8f8; }
.sort-btn.active { background: #000; color: #fff; border-color: #000; }

.ai-insight-box {
  background: #323232;
  color: #fff;
  border-radius: 8px;
  padding: 24px;
  margin-top: 24px;
}
.ai-insight-box h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
}
.ai-insight-item {
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.6;
}
.ai-insight-vendor {
  color: #FF6400;
  font-weight: 700;
}

/* ── Overview Specifics ─────────────────────────────────────── */
.overview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.category-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #EFEFEF;
}
.category-row:last-child { border-bottom: none; }
.category-name { font-size: 14px; color: #323232; min-width: 140px; }
.category-bar-wrap {
  flex: 1;
  margin: 0 16px;
  height: 6px;
  background: #EFEFEF;
  border-radius: 3px;
  overflow: hidden;
}
.category-bar-fill {
  height: 100%;
  background: #000;
  border-radius: 3px;
}
.category-amount {
  font-size: 14px;
  font-weight: 600;
  color: #000;
  min-width: 100px;
  text-align: right;
}

.alert-list { display: flex; flex-direction: column; gap: 10px; }
.alert-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: #fff;
  border: 1px solid #CCCCCC;
  border-left: 3px solid #ef4444;
  border-radius: 6px;
}
.alert-item .badge { flex-shrink: 0; }
.alert-text {
  font-size: 13px;
  color: #323232;
  line-height: 1.4;
  flex: 1;
}
.alert-text strong { color: #000; font-weight: 700; }
.alert-savings {
  font-size: 13px;
  font-weight: 700;
  color: #00CE84;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Footer ─────────────────────────────────────────────────── */
.footer {
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #939598;
  max-width: 1440px;
  margin: 20px auto 0;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 900px) {
  .overview-grid { grid-template-columns: 1fr; }
  .rec-detail-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .header { padding: 0 16px; }
  .tab-nav { padding: 0 16px; }
  .main { padding: 20px 16px; }
}
@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .section-header { flex-direction: column; gap: 12px; }
}
</style>
</head>

// Utility Functions
// ═══════════════════════════════════════════════════════════════════════════

function fmt(n) {
  if (n == null) return "—";
  return "$" + Math.round(n).toLocaleString("en-US");
}

function fmtK(n) {
  if (n == null) return "—";
  if (Math.abs(n) >= 1000000) return "$" + (n / 1000000).toFixed(1) + "M";
  if (Math.abs(n) >= 1000) return "$" + Math.round(n / 1000) + "k";
  return "$" + Math.round(n);
}

function escHtml(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════════════
// Pre-compute: Savings Estimates for Recommendations
// ═══════════════════════════════════════════════════════════════════════════

const vendorLookup = {};
DATA.vendors.forEach(v => { vendorLookup[v.name] = v; });

const recsEnriched = DATA.recommendations.map(rec => {
  const es = rec.estimatedSavings;
  return {
    ...rec,
    estSavings: (typeof es === "number") ? es : null
  };
});

let recSortMode = "savings";

function sortRecs() {
  const sorted = [...recsEnriched];
  if (recSortMode === "savings") {
    sorted.sort((a, b) => (b.estSavings || 0) - (a.estSavings || 0));
  } else if (recSortMode === "confidence") {
    const order = { "HIGH": 3, "MEDIUM": 2, "LOW": 1 };
    sorted.sort((a, b) => (order[b.confidence] || 0) - (order[a.confidence] || 0));
  } else if (recSortMode === "status") {
    const order = { "ACTION REQUIRED": 3, "REVIEW": 2, "RESOLVED": 1 };
    sorted.sort((a, b) => (order[b.status] || 0) - (order[a.status] || 0));
  }
  return sorted;
}

        <div class="kpi-value">${S.invoice_count.toLocaleString()}</div>
        <div class="kpi-sub">December 2025</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Recommendations</div>
        <div class="kpi-value">${S.recommendation_count.toLocaleString()}</div>

        <div class="kpi-sub">Flagged vendor spend/mo</div>

    <div class="overview-grid">

        ${categories.map(([cat, amt]) => `
          <div class="category-row">

            </div>
            <span class="category-amount">${fmtK(amt)}</span>
          </div>
        `).join("")}
      </div>
      <div class="card">
        <div class="card-title">Priority Alerts</div>
        <div class="card-subtitle">Top action items by estimated savings</div>
        <div class="alert-list">
          ${topAlerts.map(r => `
            <div class="alert-item">
              <span class="badge ${r.statusClass}">${escHtml(r.status)}</span>
              <div class="alert-text">
                <strong>${escHtml(r.vendor)}</strong>
                ${escHtml(r.service)} &mdash; ${escHtml(r.categoryLabel)}
              </div>
              ${r.estSavings ? `<span class="alert-savings">${fmtK(r.estSavings)}/yr</span>` : ""}
            </div>
          `).join("")}

      </div>

  `;
}

let vendorChart = null;

function renderVendorChart() {
  const canvas = document.getElementById("vendorSpendChart");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  if (vendorChart) vendorChart.destroy();

  const top8 = [...DATA.vendors]
    .sort((a, b) => b.monthly - a.monthly)
    .slice(0, 8);

  const barColors = top8.map(v => {
    switch (v.flag.type) {
      case "flag-duplicate": return "#fca5a5";
      case "flag-benchmark": return "#fde68a";
      case "flag-underutil": return "#fde047";
      case "flag-detail":    return "#cbd5e1";
      default:               return "#000";
    }
  });
  const borderColors = top8.map(v => {
    switch (v.flag.type) {
      case "flag-duplicate": return "#ef4444";
      case "flag-benchmark": return "#f59e0b";
      case "flag-underutil": return "#eab308";
      case "flag-detail":    return "#94a3b8";
      default:               return "#000";
    }
  });

  vendorChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: top8.map(v => v.name),
      datasets: [{
        label: "Monthly Spend ($)",
        data: top8.map(v => v.monthly),
        backgroundColor: barColors,
        borderColor: borderColors,
        borderWidth: 2,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => " " + fmt(c.raw) } }
      },
      scales: {
        x: {
          ticks: {
            callback: v => "$" + (v / 1000).toFixed(0) + "k",
            color: "#6D6E71",
            font: { size: 12 }
          },
          grid: { color: "#EFEFEF" }
        },
        y: {
          ticks: { color: "#323232", font: { size: 12 } },
          grid: { display: false }
        }
      }
    }
  });
}

// TAB 3: Recommendations
// ═══════════════════════════════════════════════════════════════════════════

let recShowCount = 25;
let recActiveFilter = "all";

function getCategoryLabel(cls) {
  const map = {
    "cat-duplicate": "DUPLICATE SERVICE",
    "cat-benchmark": "ABOVE BENCHMARK",
    "cat-detail": "INSUFFICIENT DETAIL",
    "cat-underutil": "UNDERUTILIZED RETAINER",
    "cat-scope": "SCOPE CREEP",
    "cat-singleline": "SINGLE LINE ITEM"
  };
  return map[cls] || cls.replace("cat-", "").toUpperCase();
}

function renderRecCard(rec, idx) {
  const savingsHtml = rec.estSavings
    ? `<span class="rec-savings-amount">${fmtK(rec.estSavings)}</span>`
    : `<span class="rec-savings-amount muted">Data needed</span>`;

  return `<div class="rec-card ${rec.categoryClass}" data-category="${rec.categoryClass}" id="rec-${idx}">
    <div class="rec-card-header" onclick="document.getElementById('rec-${idx}').classList.toggle('expanded')">
      <div class="rec-header-left">
        <span class="rec-category-tag ${rec.categoryClass}">${escHtml(rec.categoryLabel)}</span>
        <span class="rec-vendor-name">${escHtml(rec.vendor)}</span>
        <span class="rec-service-type">&middot; ${escHtml(rec.service)}</span>
      </div>
      <div class="rec-header-right">
        <span class="badge ${rec.confidenceClass}">${escHtml(rec.confidence)}</span>
        <span class="badge ${rec.statusClass}">${escHtml(rec.status)}</span>
        ${savingsHtml}
        <span class="rec-expand-icon">&#9660;</span>
      </div>
    </div>
    <div class="rec-detail">
      <div class="rec-detail-grid">
        <div>
          <div class="rec-detail-label">Rationale</div>
          <div class="rec-detail-text">${escHtml(rec.detail)}</div>
        </div>
        <div>
          <div class="rec-detail-label">Recommended Action</div>
          <div class="rec-detail-text">Review this finding with Finance. ${escHtml(rec.detail)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function getFilteredRecs() {
  const sorted = sortRecs();
  if (recActiveFilter === "all") return sorted;
  return sorted.filter(r => r.categoryClass === recActiveFilter);
}

function renderRecommendations() {
  const el = document.getElementById("tab-recommendations");

  // Compute category counts for filter buttons
  const catCounts = {};
  recsEnriched.forEach(r => {
    catCounts[r.categoryClass] = (catCounts[r.categoryClass] || 0) + 1;
  });

  const filterCategories = [
    { key: "all", label: "All", count: recsEnriched.length },
    { key: "cat-duplicate", label: "Duplicate Service" },
    { key: "cat-benchmark", label: "Above Benchmark" },
    { key: "cat-detail", label: "Insufficient Detail" },
    { key: "cat-underutil", label: "Underutilized Retainer" },
    { key: "cat-scope", label: "Scope Creep" },
    { key: "cat-singleline", label: "Single Line Item" }
  ].filter(f => f.key === "all" || catCounts[f.key]);

  filterCategories.forEach(f => {
    if (f.key !== "all" && !f.count) f.count = catCounts[f.key] || 0;
    if (f.key === "all") f.count = recsEnriched.length;
  });

  el.innerHTML = `
    <div class="section-header">
      <div>
        <h2 class="section-title">AI-Generated Recommendations</h2>
        <div class="section-subtitle">Each includes rationale, estimated savings, and confidence level. Click to expand.</div>
      </div>
      <div class="total-potential">
        <div class="total-potential-value">${fmtK(totalPotentialSavings)}</div>
        <div class="total-potential-label">Total Potential</div>
      </div>
    </div>

    <div class="rec-filters" id="rec-filters">
      ${filterCategories.map(f => `
        <button class="filter-btn${f.key === recActiveFilter ? " active" : ""}" data-filter="${f.key}">
          ${f.label} (${f.count.toLocaleString()})
        </button>
      `).join("")}
    </div>

    <div class="rec-toolbar">
      <div class="sort-group">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn${recSortMode === "savings" ? " active" : ""}" data-sort="savings">Savings (high to low)</button>
        <button class="sort-btn${recSortMode === "confidence" ? " active" : ""}" data-sort="confidence">Confidence</button>
        <button class="sort-btn${recSortMode === "status" ? " active" : ""}" data-sort="status">Status</button>
      </div>
    </div>

    <div id="rec-list"></div>
    <div id="rec-load-more-wrap"></div>
  `;

  // Wire up filter buttons
  document.querySelectorAll("#rec-filters .filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      recActiveFilter = btn.dataset.filter;
      recShowCount = 25;
      document.querySelectorAll("#rec-filters .filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderRecList();
    });
  });

  // Wire up sort buttons
  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      recSortMode = btn.dataset.sort;
      recShowCount = 25;
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderRecList();
    });
  });

  renderRecList();
}

function renderRecList() {
  const filtered = getFilteredRecs();
  const visible = filtered.slice(0, recShowCount);
  const remaining = filtered.length - visible.length;

  const listEl = document.getElementById("rec-list");
  listEl.innerHTML = visible.map((r, i) => renderRecCard(r, i)).join("");

  const loadMoreEl = document.getElementById("rec-load-more-wrap");
  if (remaining > 0) {
    loadMoreEl.innerHTML = `
      <button class="load-more-btn" id="rec-load-more">
        Show More (${remaining.toLocaleString()} remaining)
      </button>
    `;
    document.getElementById("rec-load-more").addEventListener("click", () => {
      recShowCount += 25;
      renderRecList();
    });
  } else {
    loadMoreEl.innerHTML = "";
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 4: Data Quality
// ═══════════════════════════════════════════════════════════════════════════

const MISSING_LABELS = {
  "units": "Unit counts",
  "rates": "Rate structure",
  "usage": "Volume metrics",
  "deliverables": "Deliverable detail",
  "scope": "Scope definition"
};

function renderDataQuality() {
  const el = document.getElementById("tab-data-quality");
  const Q = DATA.quality;

  // Compute KPIs
  const scores = Q.map(q => q.score);
  const avgScore = scores.length > 0 ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
  const avgScore5 = (avgScore * 5).toFixed(1);
  const belowThreshold = Q.filter(q => q.score <= 0.4).length; // score <= 2/5
  const spendAtRisk = Q.filter(q => q.score <= 0.4).reduce((s, q) => s + q.annual, 0);

  // Worst offenders for AI insight
  const worstVendors = Q.filter(q => q.score <= 0.4 && q.annual > 0)
    .sort((a, b) => b.annual - a.annual)
    .slice(0, 3);

  el.innerHTML = `
    <div class="section-header">
      <div>
        <h2 class="section-title">Invoice Data Quality Assessment</h2>
        <div class="section-subtitle">AI evaluates every invoice for analytical sufficiency. Low scores limit the system's ability to benchmark, detect trends, and identify savings.</div>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns: repeat(3, 1fr); max-width: 700px;">
      <div class="kpi-card">
        <div class="kpi-label">Avg Quality Score</div>
        <div class="kpi-value">${avgScore5.split('.')[0]} / 5</div>
        <div class="kpi-sub">Across all vendors</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Vendors Below Threshold</div>
        <div class="kpi-value">${belowThreshold}</div>
        <div class="kpi-sub">Score &le; 2 &mdash; action required</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Spend at Risk</div>
        <div class="kpi-value">${fmtK(spendAtRisk)}</div>
        <div class="kpi-sub">Limited analysis possible</div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Vendor</th>
              <th>Quality Score</th>
              <th>Annual Spend</th>
              <th>Invoices</th>
              <th>Missing Data Elements</th>
            </tr>
          </thead>
          <tbody id="quality-tbody"></tbody>
        </table>
      </div>
    </div>

    ${worstVendors.length > 0 ? `
    <div class="ai-insight-box">
      <h3>AI Insight &mdash; Required Behavior</h3>
      ${worstVendors.map(v => {
        const missingStr = v.missing.map(m => MISSING_LABELS[m] || m).join(", ");
        return `<div class="ai-insight-item">
          <span class="ai-insight-vendor">${escHtml(v.vendor)} (${fmtK(v.annual)}/yr):</span>
          Invoices lack ${missingStr || "key detail"}. Spend trend cannot be decomposed into volume vs. price effects. Recommend requesting itemized billing.
        </div>`;
      }).join("")}
    </div>` : ""}
  `;

  // Populate quality table
  const tbody = document.getElementById("quality-tbody");
  tbody.innerHTML = Q.map(q => {
    const score5 = Math.round(q.score * 5);
    const colorClass = score5 <= 2 ? "low" : score5 <= 3 ? "med" : "high";
    const blocks = Array.from({length: 5}, (_, i) =>
      `<span class="quality-block${i < score5 ? ` filled ${colorClass}` : ""}"></span>`
    ).join("");
    const missingHtml = q.missing.length === 0
      ? `<span class="complete-text">&#10003; Complete</span>`
      : q.missing.map(m => `<span class="missing-tag">${escHtml(MISSING_LABELS[m] || m)}</span>`).join("");

    return `<tr>
      <td class="td-vendor">${escHtml(q.vendor)}</td>
      <td>
        <div class="quality-blocks">${blocks}</div>
        <span class="quality-score-num">${score5}/5</span>
      </td>
      <td class="td-amount">${q.annual > 0 ? fmtK(q.annual) : "—"}</td>
      <td>${q.invoices}</td>
      <td>${missingHtml}</td>
    </tr>`;
  }).join("");
}
